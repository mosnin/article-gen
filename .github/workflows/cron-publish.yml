name: Cron Publish

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call publish cron endpoint
        run: |
          curl -s -X POST "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/cron/publish" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" || true
